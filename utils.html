<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Utils</title>
  <style>
    :root { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0b1220; color: #e7eefc; }
    .card {
      width: min(520px, calc(100% - 28px));
      padding: 18px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    h1 { margin: 0 0 10px; font-size: 18px; }
    a {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.10);
      color: #e7eefc;
      text-decoration: none;
      font-weight: 650;
    }
    a:hover { background: rgba(255,255,255,0.14); }
    .hint { margin-top: 10px; opacity: 0.75; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Utils</h1>
    <a href="./unicode_to_preeti.html">Open Unicode → Preeti Converter</a>
  </div>
</body>
</html>
