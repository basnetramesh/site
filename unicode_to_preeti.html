<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Unicode → Preeti Converter</title>

	<style>
		/* ---------- Theme tokens (futuristic dark, brand-matched) ---------- */
		:root {
			--bg: #0b0b0f;
			--text: #f5f6fb;
			--muted: #b4b6c6;
			--faint: #6f7186;
			--accent: #7b61ff;
			--energy: #4be1d0;
			--card: rgba(20, 20, 29, 0.66);
			--border: rgba(255, 255, 255, 0.07);
			--field: rgba(0, 0, 0, 0.28);
			--btn: rgba(255, 255, 255, 0.05);
			--btnHover: rgba(255, 255, 255, 0.1);
			--focus: rgba(75, 225, 208, 0.55);
			--focusRing: rgba(75, 225, 208, 0.16);
			--shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
			--grad: linear-gradient(120deg, #7b61ff, #4be1d0);
			--radius: 18px;
			--radiusSm: 12px;
			--mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
			font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
			color-scheme: dark;
		}

		/* Light mode overrides */
		[data-theme="light"] {
			--bg: #eef0f7;
			--text: #0c1220;
			--muted: rgba(12, 18, 32, 0.72);
			--faint: rgba(12, 18, 32, 0.5);
			--accent: #6a4ce0;
			--energy: #119e8c;
			--card: rgba(255, 255, 255, 0.92);
			--border: rgba(12, 18, 32, 0.1);
			--field: rgba(12, 18, 32, 0.04);
			--btn: rgba(12, 18, 32, 0.05);
			--btnHover: rgba(12, 18, 32, 0.1);
			--focus: rgba(17, 158, 140, 0.45);
			--focusRing: rgba(17, 158, 140, 0.14);
			--shadow: 0 12px 30px rgba(12, 18, 32, 0.1);
			color-scheme: light;
		}

		@media (prefers-color-scheme: light) {
			:root:not([data-theme]) {
				--bg: #eef0f7;
				--text: #0c1220;
				--muted: rgba(12, 18, 32, 0.72);
				--faint: rgba(12, 18, 32, 0.5);
				--accent: #6a4ce0;
				--energy: #119e8c;
				--card: rgba(255, 255, 255, 0.92);
				--border: rgba(12, 18, 32, 0.1);
				--field: rgba(12, 18, 32, 0.04);
				--btn: rgba(12, 18, 32, 0.05);
				--btnHover: rgba(12, 18, 32, 0.1);
				--focus: rgba(17, 158, 140, 0.45);
				--focusRing: rgba(17, 158, 140, 0.14);
				--shadow: 0 12px 30px rgba(12, 18, 32, 0.1);
				color-scheme: light;
			}
		}

		*,
		*::before,
		*::after {
			box-sizing: border-box;
		}

		html, body {
			margin: 0;
			background: var(--bg);
			color: var(--text);
			min-height: 100vh;
			-webkit-font-smoothing: antialiased;
		}

		/* animated grid backdrop */
		body::before {
			content: ""; position: fixed; inset: -50%; z-index: 0; pointer-events: none;
			background-image:
				linear-gradient(var(--border) 1px, transparent 1px),
				linear-gradient(90deg, var(--border) 1px, transparent 1px);
			background-size: 46px 46px;
			-webkit-mask-image: radial-gradient(circle at 50% 18%, #000 0%, transparent 66%);
			mask-image: radial-gradient(circle at 50% 18%, #000 0%, transparent 66%);
			animation: drift 40s linear infinite; opacity: 0.4;
		}
		@keyframes drift { to { transform: translate(46px, 46px); } }

		/* aurora glow field */
		.aurora { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; filter: blur(120px); opacity: 0.14; }
		.aurora b { position: absolute; display: block; border-radius: 50%; }
		.aurora .b1 { width: 520px; height: 520px; background: #5b46c4; top: -200px; left: -120px; animation: float1 24s ease-in-out infinite; }
		.aurora .b2 { width: 460px; height: 460px; background: #2e8f86; top: 6%; right: -160px; animation: float2 30s ease-in-out infinite; }
		@keyframes float1 { 50% { transform: translate(80px, 70px) scale(1.12); } }
		@keyframes float2 { 50% { transform: translate(-70px, 90px) scale(1.16); } }

		.wrap {
			position: relative;
			z-index: 1;
			width: min(1100px, 94vw);
			margin: 0 auto;
			padding: 28px clamp(16px, 3vw, 28px) 40px;
		}

		/* back link */
		.back {
			display: inline-flex; align-items: center; gap: 8px;
			font-size: 13px; color: var(--muted); text-decoration: none;
			width: max-content; margin-bottom: 18px;
			transition: color 0.2s ease, transform 0.2s ease;
		}
		.back svg { width: 15px; height: 15px; }
		.back:hover, .back:focus-visible { color: var(--text); transform: translateX(-2px); }

		.card {
			background: var(--card);
			border: 1px solid var(--border);
			border-radius: var(--radius);
			padding: 22px;
			box-shadow: var(--shadow);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
		}

		.topbar {
			display: flex;
			align-items: flex-start;
			justify-content: space-between;
			gap: 12px;
			flex-wrap: wrap;
			margin-bottom: 4px;
		}

		.eyebrow { letter-spacing: 0.26em; text-transform: uppercase; font-size: 11px; color: var(--accent); font-weight: 600; display: block; margin-bottom: 8px; }

		h1 {
			font-size: clamp(22px, 3vw, 28px);
			margin: 0 0 8px;
			letter-spacing: -0.02em;
			line-height: 1.1;
		}
		h1 .glow { background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }

		.sub {
			margin: 0;
			color: var(--muted);
			line-height: 1.55;
			font-size: 13.5px;
			max-width: 560px;
		}
		.sub b { color: var(--text); }

		.actions {
			display: flex;
			align-items: center;
			gap: 10px;
			flex-wrap: wrap;
		}

		.pill {
			display: inline-flex;
			align-items: center;
			gap: 8px;
			padding: 8px 12px;
			border-radius: 999px;
			border: 1px solid var(--border);
			background: var(--btn);
			font-size: 12px;
			color: var(--text);
			user-select: none;
		}

		.toggle {
			appearance: none;
			width: 42px;
			height: 24px;
			border-radius: 999px;
			background: rgba(255, 255, 255, 0.12);
			border: 1px solid var(--border);
			position: relative;
			cursor: pointer;
			outline: none;
			flex: 0 0 auto;
			transition: background 0.2s ease;
		}
		.toggle:checked { background: rgba(75, 225, 208, 0.35); }

		[data-theme="light"] .toggle {
			background: rgba(12, 18, 32, 0.12);
		}

		.toggle::after {
			content: "";
			width: 18px;
			height: 18px;
			border-radius: 50%;
			background: var(--text);
			position: absolute;
			top: 50%;
			left: 3px;
			transform: translateY(-50%);
			transition: left 160ms ease;
		}

		.toggle:checked::after {
			left: 21px;
		}

		.grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 14px;
			margin-top: 18px;
		}

		.col {
			min-width: 0;
		}

		@media (max-width: 900px) {
			.grid {
				grid-template-columns: 1fr;
			}
		}

		label {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 10px;
			font-size: 11px;
			letter-spacing: 0.04em;
			text-transform: uppercase;
			color: var(--faint);
			margin: 4px 0 8px;
		}

		.counter {
			font-size: 11px;
			letter-spacing: normal;
			text-transform: none;
			opacity: 0.85;
			font-family: var(--mono);
		}

		textarea {
			width: 100%;
			min-height: clamp(280px, 60vh, 680px);
			max-width: 100%;
			resize: vertical;
			border-radius: var(--radiusSm);
			border: 1px solid var(--border);
			background: var(--field);
			color: var(--text);
			padding: 14px;
			line-height: 1.55;
			font-size: 14px;
			outline: none;
			overflow: auto;
			display: block;
			word-break: break-word;
			transition: border-color 0.2s ease, box-shadow 0.2s ease;
		}

		#p {
			font-family: var(--mono);
		}

		textarea:focus {
			border-color: var(--focus);
			box-shadow: 0 0 0 4px var(--focusRing);
		}

		.row {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
			margin-top: 16px;
			align-items: center;
			justify-content: space-between;
		}

		.rowLeft,
		.rowRight {
			display: flex;
			gap: 10px;
			flex-wrap: wrap;
			align-items: center;
		}

		button {
			border: 1px solid var(--border);
			background: var(--btn);
			color: var(--text);
			padding: 10px 14px;
			border-radius: 12px;
			cursor: pointer;
			font-weight: 600;
			font-size: 13px;
			transition: background 0.2s ease, border-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
		}

		button:hover {
			background: var(--btnHover);
			transform: translateY(-1px);
		}

		/* primary action — gradient accent */
		#copyBtn {
			border: 0;
			color: #0b0b0f;
			font-weight: 700;
			background: var(--grad);
			box-shadow: 0 0 20px rgba(75, 225, 208, 0.18);
		}
		#copyBtn:hover { box-shadow: 0 0 26px rgba(75, 225, 208, 0.32); }

		.ghost {
			background: transparent;
		}
		.ghost:hover { background: var(--btnHover); }

		.hint {
			margin-top: 12px;
			font-size: 12px;
			color: var(--muted);
			line-height: 1.5;
		}
		.hint code {
			font-family: var(--mono);
			background: var(--field);
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 1px 6px;
			font-size: 12px;
		}

		.toast {
			position: fixed;
			left: 50%;
			bottom: 22px;
			z-index: 20;
			transform: translateX(-50%);
			padding: 10px 16px;
			border-radius: 999px;
			border: 1px solid rgba(75, 225, 208, 0.4);
			background: rgba(20, 19, 40, 0.92);
			color: var(--text);
			box-shadow: var(--shadow);
			opacity: 0;
			pointer-events: none;
			transition: opacity 160ms ease, transform 160ms ease;
			font-size: 12px;
		}
		[data-theme="light"] .toast { background: var(--card); }

		.toast.show {
			opacity: 1;
			transform: translateX(-50%) translateY(-4px);
		}

		/* ---------- Line-by-line panel ---------- */
		.linePanel {
			margin-top: 16px;
			border-top: 1px solid var(--border);
			padding-top: 16px;
			display: none;
		}

		.linePanel.show {
			display: block;
		}

		.linePanelHeader {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 10px;
			flex-wrap: wrap;
			margin-bottom: 12px;
		}

		.linePanelHeader .title {
			font-size: 13px;
			color: var(--muted);
			margin: 0;
		}

		.pairs {
			display: flex;
			flex-direction: column;
			gap: 10px;
		}

		.pair {
			border: 1px solid var(--border);
			border-radius: 14px;
			background: var(--field);
			padding: 12px;
		}

		.lineRow {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 10px;
			align-items: start;
		}

		.lineText {
			min-width: 0;
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 8px 10px;
			background: rgba(255, 255, 255, 0.03);
			white-space: pre-wrap;
			word-break: break-word;
			font-size: 13px;
			line-height: 1.45;
		}

		[data-theme="light"] .lineText {
			background: rgba(12, 18, 32, 0.03);
		}

		.lineText.preeti {
			font-family: var(--mono);
		}

		.miniBtn {
			padding: 8px 10px;
			border-radius: 10px;
			font-size: 12px;
			line-height: 1;
			white-space: nowrap;
		}

		.divider {
			height: 10px;
		}

		@media (prefers-reduced-motion: reduce) {
			.aurora b, body::before { animation: none; }
		}

		@media (max-width: 520px) {
			.lineRow {
				grid-template-columns: 1fr;
			}

			.miniBtn {
				width: 100%;
			}
		}
	</style>
</head>

<body>
	<div class="aurora" aria-hidden="true"><b class="b1"></b><b class="b2"></b></div>
	<div class="wrap">
		<a class="back" href="./utils.html">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
			Back to utilities
		</a>
		<div class="card">
			<div class="topbar">
				<div>
					<span class="eyebrow">Nepali · Unicode → Preeti</span>
					<h1>Unicode → <span class="glow">Preeti</span> Converter</h1>
					<p class="sub">
						Paste Nepali Unicode on the left. Output Preeti typing appears on the right.
						Copy the right text and set font to <b>Preeti</b>.
					</p>
				</div>

				<div class="actions">
					<div class="pill" title="Toggle light/dark mode">
						<span id="themeLabel">Dark</span>
						<input id="themeToggle" class="toggle" type="checkbox" aria-label="Toggle theme">
					</div>
				</div>
			</div>

			<div class="grid">
				<div class="col">
					<label for="u">
						<span>Nepali Unicode (Devanagari)</span>
						<span class="counter"><span id="uCount">0</span> chars</span>
					</label>
					<textarea id="u" placeholder="Paste Nepali Unicode here..."></textarea>
				</div>

				<div class="col">
					<label for="p">
						<span>Preeti typing (copy this)</span>
						<span class="counter"><span id="pCount">0</span> chars</span>
					</label>
					<textarea id="p" placeholder="Preeti output will appear here..." readonly></textarea>
				</div>
			</div>

			<div class="row">
				<div class="rowLeft">
					<button id="copyBtn">Copy Preeti Output</button>
					<button id="copyUnicodeBtn" class="ghost">Copy Unicode</button>
				</div>
				<div class="rowRight">
					<button id="lineBtn" class="ghost">Line By Line Display</button>
					<button id="clearBtn">Clear</button>
				</div>
			</div>

			<!-- Line-by-line display -->
			<div id="linePanel" class="linePanel" aria-live="polite">
				<div class="linePanelHeader">
					<p class="title">Line-by-line conversion (Unicode + Preeti). Use the copy buttons on the right.</p>
					<button id="copyAllPairsBtn" class="ghost">Copy All (Pairs)</button>
				</div>
				<div id="pairs" class="pairs"></div>
			</div>

			<div class="hint">

			</div>
		</div>
	</div>

	<div id="toast" class="toast">Copied!</div>

	<script>
		/* ---------------- THEME (light/dark) ---------------- */
		const root = document.documentElement;
		const themeToggle = document.getElementById("themeToggle");
		const themeLabel = document.getElementById("themeLabel");

		function setTheme(mode) {
			if (!mode) {
				root.removeAttribute("data-theme");
				localStorage.removeItem("theme");
				return;
			}
			root.setAttribute("data-theme", mode);
			localStorage.setItem("theme", mode);
		}

		function syncThemeUI() {
			const mode = root.getAttribute("data-theme");
			let effective = mode;
			if (!effective) {
				effective = window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
			}
			themeToggle.checked = (effective === "light");
			themeLabel.textContent = effective === "light" ? "Light" : "Dark";
		}

		const savedTheme = localStorage.getItem("theme");
		if (savedTheme === "light" || savedTheme === "dark") setTheme(savedTheme);
		syncThemeUI();

		themeToggle.addEventListener("change", () => {
			setTheme(themeToggle.checked ? "light" : "dark");
			syncThemeUI();
		});

		window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", () => {
			if (!localStorage.getItem("theme")) syncThemeUI();
		});

		/* ---------------- CONVERTER (your exact logic) ---------------- */
		const VOWELS = {
			"अ": "c", "आ": "cf", "इ": "O", "ई": "O{", "उ": "p", "ऊ": "pm",
			"ए": "P", "ऐ": "P]", "ओ": "cf]", "औ": "cf}", "ऋ": "c["
		};

		const MATRAS = {
			"ा": "f", "ी": "L", "ु": "'", "ू": "\"", "े": "]", "ै": "}", "ो": "f]", "ौ": "f}", "ृ": "[",
			"ं": "+", "ँ": "F", "ः": ":"
		};

		const CONS = {
			"क": "s", "ख": "v", "ग": "u", "घ": "3", "ङ": "ª",
			"च": "r", "छ": "5", "ज": "h", "झ": "´", "ञ": "`",
			"ट": "6", "ठ": "7", "ड": "8", "ढ": "9", "ण": "0f",
			"त": "t", "थ": "y", "द": "b", "ध": "w", "न": "g",
			"प": "k", "फ": "km", "ब": "a", "भ": "e", "म": "d",
			"य": "o", "र": "/", "ल": "n", "व": "j",
			"श": "z", "ष": "if", "स": ";", "ह": "x"
		};

		const SIGNS = {
			"्": "\\", "।": ".", "॥": "..",
			"—": "—", "–": "–", ",": ",", ".": ".", "?": "?", "!": "!",
			"(": "(", ")": ")", "“": "“", "”": "”", "‘": "‘", "’": "’",
			"\n": "\n", "\t": "\t", " ": " "
		};

		const DIGITS = { "०": "0", "१": "1", "२": "2", "३": "3", "४": "4", "५": "5", "६": "6", "७": "7", "८": "8", "९": "9" };

		const CHAR_MAP = Object.assign({}, VOWELS, CONS, SIGNS, DIGITS, {
			"ं": MATRAS["ं"], "ँ": MATRAS["ँ"], "ः": MATRAS["ः"]
		});

		const PREETI_I = "l";

		const CLUSTERS = [
			["क्ष", "If"],
			["त्र", "q"],
			["ज्ञ", "1"],
			["श्र", ">"],
			["द्ध", "4"],
			["प्र", "k|"],
			["ज्य", "Ho"],
			["ध्य", "Wo"],
			["ख्य", "Vo"],
			["त्य", "To"],
			["रु", "?"],
			["रू", "¿"]
		];

		const HALF_FORMS = {
			"स्": ":",
			"न्": "G",
			"म्": "D",
			"ग्": "U",
			"श्": "Z"
		};

		function isConsonant(ch) { return CONS[ch] !== undefined; }
		function mapConsonant(ch) { return CONS[ch] !== undefined ? CONS[ch] : ch; }

		function unicodeToPreeti(text) {
			let out = [];
			let i = 0;

			while (i < text.length) {
				let matched = false;
				for (const [src, dst] of CLUSTERS) {
					if (text.startsWith(src, i)) {
						out.push(dst);
						i += src.length;
						matched = true;
						break;
					}
				}
				if (matched) continue;

				if (text[i] === "र" && text[i + 1] === "्" && isConsonant(text[i + 2] || "")) {
					const c = text[i + 2];
					const cm = mapConsonant(c);
					if (text[i + 3] === "ि") {
						out.push(PREETI_I + cm + "{");
						i += 4;
					} else {
						out.push(cm + "{");
						i += 3;
					}
					continue;
				}

				if (isConsonant(text[i]) && text[i + 1] === "्" && text[i + 2] === "र") {
					out.push(mapConsonant(text[i]) + "|");
					i += 3;
					continue;
				}

				const two = text.slice(i, i + 2);
				if (HALF_FORMS[two] !== undefined) {
					out.push(HALF_FORMS[two]);
					i += 2;
					continue;
				}

				if (isConsonant(text[i]) && text[i + 1] === "ि") {
					out.push(PREETI_I + mapConsonant(text[i]));
					i += 2;
					continue;
				}

				const ch = text[i];
				if (MATRAS[ch] !== undefined) {
					out.push(MATRAS[ch]);
					i += 1;
					continue;
				}

				out.push(CHAR_MAP[ch] !== undefined ? CHAR_MAP[ch] : ch);
				i += 1;
			}

			return out.join("");
		}

		/* ---------------- UI WIRING ---------------- */
		const u = document.getElementById("u");
		const p = document.getElementById("p");
		const uCount = document.getElementById("uCount");
		const pCount = document.getElementById("pCount");
		const toast = document.getElementById("toast");

		const lineBtn = document.getElementById("lineBtn");
		const linePanel = document.getElementById("linePanel");
		const pairsEl = document.getElementById("pairs");
		const copyAllPairsBtn = document.getElementById("copyAllPairsBtn");
		let linePanelOpen = false;

		function showToast(msg) {
			toast.textContent = msg;
			toast.classList.add("show");
			clearTimeout(showToast._t);
			showToast._t = setTimeout(() => toast.classList.remove("show"), 900);
		}

		async function copyText(text, msg) {
			try {
				await navigator.clipboard.writeText(text);
				showToast(msg || "Copied!");
			} catch (e) {
				const temp = document.createElement("textarea");
				temp.value = text;
				document.body.appendChild(temp);
				temp.select();
				document.execCommand("copy");
				document.body.removeChild(temp);
				showToast(msg || "Copied!");
			}
		}

		function renderLineByLine() {
			const lines = u.value.split(/\r?\n/);
			pairsEl.innerHTML = "";

			const frag = document.createDocumentFragment();

			lines.forEach((line, idx) => {
				const preetiLine = unicodeToPreeti(line);

				const pair = document.createElement("div");
				pair.className = "pair";

				// Unicode row
				const rowU = document.createElement("div");
				rowU.className = "lineRow";

				const txtU = document.createElement("div");
				txtU.className = "lineText";
				txtU.textContent = line;

				const btnU = document.createElement("button");
				btnU.className = "miniBtn";
				btnU.type = "button";
				btnU.textContent = "⧉ Copy";
				btnU.addEventListener("click", () => copyText(line, `Unicode line ${idx + 1} copied`));

				rowU.appendChild(txtU);
				rowU.appendChild(btnU);

				// Spacer
				const divider = document.createElement("div");
				divider.className = "divider";

				// Preeti row
				const rowP = document.createElement("div");
				rowP.className = "lineRow";

				const txtP = document.createElement("div");
				txtP.className = "lineText preeti";
				txtP.textContent = preetiLine;

				const btnP = document.createElement("button");
				btnP.className = "miniBtn";
				btnP.type = "button";
				btnP.textContent = "⧉ Copy";
				btnP.addEventListener("click", () => copyText(preetiLine, `Preeti line ${idx + 1} copied`));

				rowP.appendChild(txtP);
				rowP.appendChild(btnP);

				pair.appendChild(rowU);
				pair.appendChild(divider);
				pair.appendChild(rowP);

				frag.appendChild(pair);
			});

			pairsEl.appendChild(frag);
		}

		function update() {
			const preeti = unicodeToPreeti(u.value);
			p.value = preeti;
			uCount.textContent = String(u.value.length);
			pCount.textContent = String(preeti.length);

			if (linePanelOpen) renderLineByLine();
		}
		u.addEventListener("input", update);

		document.getElementById("copyBtn").addEventListener("click", () => copyText(p.value, "Preeti copied"));
		document.getElementById("copyUnicodeBtn").addEventListener("click", () => copyText(u.value, "Unicode copied"));

		document.getElementById("clearBtn").addEventListener("click", () => {
			u.value = "";
			p.value = "";
			update();
			u.focus();
		});

		lineBtn.addEventListener("click", () => {
			linePanelOpen = !linePanelOpen;
			linePanel.classList.toggle("show", linePanelOpen);
			lineBtn.textContent = linePanelOpen ? "Hide Line By Line" : "Line By Line Display";
			if (linePanelOpen) {
				renderLineByLine();
				showToast("Line-by-line opened");
			}
		});

		copyAllPairsBtn.addEventListener("click", () => {
			const lines = u.value.split(/\r?\n/);
			const out = [];
			lines.forEach((line) => {
				out.push(line);
				out.push(unicodeToPreeti(line));
				out.push(""); // blank line between pairs
			});
			copyText(out.join("\n"), "All pairs copied");
		});

		update();
	</script>
</body>

</html>
